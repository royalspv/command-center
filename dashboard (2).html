<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Командный Центр</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070e;
    --surface: #0f0f1a;
    --border: #1a1a2e;
    --gold: #f0c040;
    --gold-dim: #a07820;
    --gold-glow: rgba(240,192,64,0.15);
    --text: #f0f0ff;
    --text-dim: #5a5a78;
    --green: #00e676;
    --green-glow: rgba(0,230,118,0.12);
    --red: #ff4444;
    --red-glow: rgba(255,68,68,0.12);
    --blue: #40a0ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 10% 10%, rgba(240,192,64,0.06) 0%, transparent 45%),
      radial-gradient(ellipse at 90% 90%, rgba(64,160,255,0.05) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    text-shadow: 0 0 20px var(--gold-glow);
  }

  .header-date { font-size: 12px; color: var(--text-dim); }

  /* SECTION */
  .section { margin-bottom: 22px; }

  .section-title {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ЯКОРЬ + БАРЬЕР */
  .two-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .card {
    background: var(--surface);
    border-radius: 10px;
    padding: 16px 18px;
    transition: all 0.25s;
  }

  .card.gold-card {
    border: 1px solid var(--gold-dim);
    box-shadow: 0 0 24px var(--gold-glow), inset 0 1px 0 rgba(240,192,64,0.1);
  }

  .card.gold-card:hover {
    border-color: var(--gold);
    box-shadow: 0 0 36px var(--gold-glow);
  }

  .card.red-card {
    border: 1px solid rgba(255,68,68,0.35);
    box-shadow: 0 0 24px var(--red-glow), inset 0 1px 0 rgba(255,68,68,0.08);
  }

  .card.red-card:hover {
    border-color: var(--red);
    box-shadow: 0 0 36px var(--red-glow);
  }

  .card-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .card-label.gold { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
  .card-label.red { color: var(--red); text-shadow: 0 0 10px var(--red); }

  .line-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    padding: 5px 0;
    outline: none;
    transition: border-color 0.3s;
  }

  .line-input.gold:focus { border-bottom-color: var(--gold); }
  .line-input.red:focus { border-bottom-color: var(--red); }
  .line-input::placeholder { color: var(--text-dim); font-style: italic; font-size: 13px; }

  /* БЛОКНОТЫ */
  .notebooks-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .nb-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nb-btn:hover { border-color: var(--gold-dim); color: var(--text); }

  .nb-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-glow);
    box-shadow: 0 0 16px var(--gold-glow);
    text-shadow: 0 0 8px rgba(240,192,64,0.5);
  }

  .nb-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .nb-btn.active .nb-dot {
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
  }

  .nb-close {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    line-height: 1;
    margin-left: 2px;
  }

  .nb-close:hover { background: var(--red); color: white; }

  /* ДЕТАЛИ */
  #detailArea { animation: fadeUp 0.3s ease both; }

  .two-grid-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .three-grid-detail { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 14px 16px;
    transition: border-color 0.2s;
  }

  .detail-card:hover { border-color: #2a2a40; }

  .detail-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .detail-textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    outline: none;
    min-height: 70px;
  }

  .detail-textarea::placeholder { color: var(--text-dim); font-style: italic; font-size: 12px; }

  /* ЗАВТРА */
  .tomorrow-card {
    background: var(--surface);
    border: 1px solid rgba(0,230,118,0.3);
    border-radius: 9px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 0 20px var(--green-glow);
  }

  .tomorrow-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--green);
    white-space: nowrap;
    text-shadow: 0 0 10px var(--green);
  }

  .tomorrow-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    padding: 4px 0;
    outline: none;
    transition: border-color 0.3s;
  }

  .tomorrow-input:focus { border-bottom-color: var(--green); }
  .tomorrow-input::placeholder { color: var(--text-dim); font-style: italic; font-size: 13px; }

  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .detail-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-shadow: 0 0 12px rgba(240,192,64,0.4);
  }

  .btn-save {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Unbounded', sans-serif;
    font-size: 8px;
    letter-spacing: 0.2em;
    padding: 7px 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-save:hover {
    background: var(--gold);
    color: var(--bg);
    box-shadow: 0 0 16px var(--gold-glow);
  }

  /* НЛМ ПОТОК — заглушка */
  .nlm-banner {
    background: var(--surface);
    border: 1px dashed #2a2a50;
    border-radius: 9px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    color: var(--text-dim);
    font-size: 12px;
    font-style: italic;
  }

  .nlm-icon {
    font-size: 16px;
    opacity: 0.4;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 650px) {
    .two-grid, .two-grid-detail, .three-grid-detail { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Командный Центр</div>
    <div class="header-date" id="currentDate"></div>
  </header>

  <!-- ЯКОРЬ -->
  <div class="section">
    <div class="section-title">Якорь</div>
    <div class="two-grid">
      <div class="card gold-card">
        <div class="card-label gold">Главная цель</div>
        <input class="line-input gold" type="text" placeholder="Чего хочу достичь в этом периоде...">
      </div>
      <div class="card gold-card">
        <div class="card-label gold">Фокус сегодня</div>
        <input class="line-input gold" type="text" placeholder="Одно главное действие на сегодня...">
      </div>
    </div>
  </div>

  <!-- БАРЬЕР -->
  <div class="section">
    <div class="section-title">Барьер</div>
    <div class="two-grid">
      <div class="card red-card">
        <div class="card-label red">Что мешает прямо сейчас</div>
        <input class="line-input red" type="text" placeholder="Главный барьер сегодня...">
      </div>
      <div class="card red-card">
        <div class="card-label red">Первый шаг к решению</div>
        <input class="line-input red" type="text" placeholder="Как преодолеть...">
      </div>
    </div>
  </div>

  <!-- БЛОКНОТЫ -->
  <div class="section">
    <div class="section-title">Блокноты НЛМ</div>
    <div class="notebooks-row" id="notebooksRow"></div>
  </div>

  <!-- ДЕТАЛИ -->
  <div id="detailArea"></div>

</div>

<script>
  // Дата
  const d = new Date();
  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  document.getElementById('currentDate').textContent =
    `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;

  // Блокноты — в будущем подтягиваются из НЛМ автоматически
  let notebooks = [
    { id: 'lichnost',  name: 'ЛИЧНОСТЬ' },
    { id: 'delo',      name: 'ДЕЛО' },
    { id: 'zdorovye',  name: 'ЗДОРОВЬЕ' },
    { id: 'smysl',     name: 'СМЫСЛ ГЛУБИНА' },
    { id: 'neuro',     name: 'ДРЕССИРОВЩИК НЕЙРО' },
    { id: 'obuchenie', name: 'ОБУЧЕНИЕ' },
    { id: 'claude',    name: 'CLAUDE' },
  ];

  let activeId = null;

  function renderNotebooks() {
    const row = document.getElementById('notebooksRow');
    row.innerHTML = '';
    notebooks.forEach(nb => {
      const btn = document.createElement('button');
      btn.className = 'nb-btn' + (nb.id === activeId ? ' active' : '');
      btn.innerHTML = `<span class="nb-dot"></span><span>${nb.name}</span><button class="nb-close" title="Удалить из КЦ">×</button>`;
      btn.querySelector('.nb-close').onclick = e => { e.stopPropagation(); removeNb(nb.id); };
      btn.onclick = () => toggleNb(nb.id);
      row.appendChild(btn);
    });
  }

  function toggleNb(id) {
    if (activeId === id) {
      activeId = null;
      document.getElementById('detailArea').innerHTML = '';
    } else {
      activeId = id;
      renderDetail(id);
    }
    renderNotebooks();
  }

  function removeNb(id) {
    if (!confirm('Скрыть блокнот из КЦ?')) return;
    notebooks = notebooks.filter(n => n.id !== id);
    if (activeId === id) {
      activeId = null;
      document.getElementById('detailArea').innerHTML = '';
    }
    renderNotebooks();
  }

  function renderDetail(id) {
    const nb = notebooks.find(n => n.id === id);
    if (!nb) return;

    document.getElementById('detailArea').innerHTML = `
      <div class="section">
        <div class="section-title">${nb.name}</div>
        <div class="detail-header">
          <div class="detail-title">${nb.name}</div>
          <button class="btn-save" onclick="flashSave(this)">Сохранить</button>
        </div>

        <div class="nlm-banner">
          <span class="nlm-icon">⟳</span>
          <span>Здесь будет автоматически поступать обобщённая информация из НЛМ по блокноту «${nb.name}»</span>
        </div>

        <div class="two-grid-detail">
          <div class="detail-card">
            <div class="detail-label">Что уже сделано</div>
            <textarea class="detail-textarea" placeholder="Прогресс и результаты..."></textarea>
          </div>
          <div class="detail-card">
            <div class="detail-label">Что мешает</div>
            <textarea class="detail-textarea" placeholder="Барьеры и сложности..."></textarea>
          </div>
        </div>

        <div class="three-grid-detail">
          <div class="detail-card">
            <div class="detail-label">Что сделать</div>
            <textarea class="detail-textarea" placeholder="Следующие шаги..."></textarea>
          </div>
          <div class="detail-card">
            <div class="detail-label">Как сделать</div>
            <textarea class="detail-textarea" placeholder="Конкретный план..."></textarea>
          </div>
          <div class="detail-card">
            <div class="detail-label">Инсайты</div>
            <textarea class="detail-textarea" placeholder="Важные открытия..."></textarea>
          </div>
        </div>

        <div class="tomorrow-card">
          <div class="tomorrow-label">→ Задача на завтра</div>
          <input class="tomorrow-input" type="text" placeholder="Одно конкретное действие завтра...">
        </div>
      </div>
    `;
  }

  function flashSave(btn) {
    btn.textContent = '✓ Сохранено';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
    setTimeout(() => {
      btn.textContent = 'Сохранить';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 1500);
  }

  renderNotebooks();
</script>
</body>
</html>
